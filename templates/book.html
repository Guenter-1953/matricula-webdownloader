<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{{ book_name }}</title>
    <link rel="stylesheet" href="/static/style.css">

    <style>
        body {
            margin: 0;
        }

        .layout {
            display: flex;
        }

        /* 🔥 Sidebar bleibt stehen */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 240px;
            height: 100vh;
            background: #f4f4f4;
            padding: 20px;
            box-sizing: border-box;
            border-right: 1px solid #ddd;
        }

        .sidebar h1 {
            font-size: 1.3rem;
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            margin-bottom: 10px;
        }

        /* 👉 Content scrollt rechts */
        .content {
            margin-left: 260px;
            padding: 20px;
            width: 100%;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .thumb {
            width: 140px;
            text-align: center;
        }

        .thumb img {
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .top-actions {
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .btn {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 6px;
            background: #2a84c9;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn:hover {
            background: #1f6ea8;
        }
    </style>
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <h1>Kirchenbuch Tool</h1>
        <nav>
            <a href="/">Start</a>
            <a href="/books">Bücher</a>
            <a href="/pdfs">PDFs</a>
            <a href="/jobs">Jobs</a>
        </nav>
    </aside>

    <main class="content">

        <section class="card">
            <h2>{{ book_name }}</h2>

            {% if pdf_exists %}
                <p><a href="/pdf/{{ pdf_name }}" target="_blank">PDF öffnen</a></p>
            {% endif %}

            <div class="top-actions">
                <!-- 🔥 NEU: Personen -->
                <a href="/book/{{ book_name }}/persons" class="btn">
                    👤 Personen anzeigen
                </a>
            </div>
        </section>

        <section class="card">
            <h2>Seiten</h2>

            <div class="gallery">
                {% for image in images %}
                    <div class="thumb">
                        <a href="/books/{{ book_name }}/{{ image }}" target="_blank">
                            <img src="/books/{{ book_name }}/{{ image }}" alt="{{ image }}">
                        </a>
                        <div>{{ image }}</div>
                    </div>
                {% endfor %}
            </div>
        </section>

    </main>

</div>

</body>
</html>
