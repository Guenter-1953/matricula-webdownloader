<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{{ book_name }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h1>Kirchenbuch Tool</h1>
        <nav>
            <a href="/">Zurück</a>
        </nav>
    </aside>

    <main class="content">
        <section class="card">
            <h2>{{ book_name }}</h2>
            {% if pdf_exists %}
                <p><a href="/pdf/{{ pdf_name }}" target="_blank">PDF öffnen</a></p>
            {% endif %}
        </section>

        <section class="card">
            <h2>Seiten</h2>
            <div class="gallery">
                {% for image in images %}
                    <div class="thumb">
                        <a href="/books/{{ book_name }}/{{ image }}" target="_blank">
                            <img src="/books/{{ book_name }}/{{ image }}" alt="{{ image }}">
                        </a>
                        <div>{{ image }}</div>
                    </div>
                {% endfor %}
            </div>
        </section>
    </main>
</div>
</body>
</html>
